services:
  app:
    build:
      context: .
    command: sh -c "pnpm db:generate && pnpm db:deploy && pnpm db:seed && pnpm dev --hostname 0.0.0.0"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: "file:../data/app.db"
      AUTH_SECRET: "${AUTH_SECRET:-dev-insecure-change-me}"
      APP_BASE_URL: "http://localhost:3000"
      INITIAL_OWNER_EMAIL: "${INITIAL_OWNER_EMAIL:-owner@example.local}"
      INITIAL_OWNER_PASSWORD: "${INITIAL_OWNER_PASSWORD:-change-me}"
      INITIAL_HOUSEHOLD_NAME: "${INITIAL_HOUSEHOLD_NAME:-Home}"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - ./data:/app/data
      - app_node_modules:/app/node_modules
      - app_next:/app/.next

  e2e:
    image: mcr.microsoft.com/playwright:v1.49.1-noble
    profiles:
      - test
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@11.7.0 --activate && pnpm install --frozen-lockfile && pnpm test:e2e"
    environment:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - .:/app
      - e2e_node_modules:/app/node_modules
      - e2e_next:/app/.next
      - e2e_data:/app/data
      - e2e_pnpm_store:/root/.local/share/pnpm/store

volumes:
  app_node_modules:
  app_next:
  e2e_node_modules:
  e2e_next:
  e2e_data:
  e2e_pnpm_store:
