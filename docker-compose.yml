services:
  app:
    build:
      context: .
    command: sh -c "pnpm db:generate && pnpm db:deploy && pnpm db:seed && pnpm dev --hostname 0.0.0.0"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: "file:../data/app.db"
      AUTH_SECRET: "${AUTH_SECRET:-dev-insecure-change-me}"
      APP_BASE_URL: "http://localhost:3000"
      INITIAL_OWNER_EMAIL: "${INITIAL_OWNER_EMAIL:-owner@example.local}"
      INITIAL_OWNER_PASSWORD: "${INITIAL_OWNER_PASSWORD:-change-me}"
      INITIAL_HOUSEHOLD_NAME: "${INITIAL_HOUSEHOLD_NAME:-Home}"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - ./data:/app/data
      - app_node_modules:/app/node_modules
      - app_next:/app/.next

volumes:
  app_node_modules:
  app_next:
