services:
  app:
    build:
      context: .
    command: pnpm dev --hostname 0.0.0.0
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next

volumes:
  app_node_modules:
  app_next:
